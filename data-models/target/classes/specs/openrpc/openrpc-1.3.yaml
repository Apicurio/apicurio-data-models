name: OpenRPC 1.3
version: 1.3
versions:
  - version: 1.3.2
    url: https://spec.open-rpc.org/#openrpc-specification
prefix: OpenRpc13
namespace: io.apicurio.datamodels.models.openrpc.v1x.v13
majorVersionPrefix: OpenRpc1x
majorVersionNamespace: io.apicurio.datamodels.models.openrpc.v1x

traits:
  - name: Extensible
    properties:
      - name: '/^x-.+$/'
        type: any
        collection: extensions
  - name: Referenceable
    properties:
      - name: '$ref'
        type: string
  - name: ServersParent
    properties:
      - name: servers
        type: '[Server]'

entities:
  - name: Document
    root: true
    traits:
      - Extensible
    properties:
      - name: openrpc
        type: string
      - name: info
        type: Info
      - name: servers
        type: '[Server]'
      - name: methods
        type: '[Method]'
      - name: components
        type: Components
      - name: externalDocs
        type: ExternalDocumentation
    propertyOrder:
      - $this
      - $Extensible

  - name: Info
    traits:
      - Extensible
    properties:
      - name: title
        type: string
      - name: description
        type: string
      - name: termsOfService
        type: string
      - name: contact
        type: Contact
      - name: license
        type: License
      - name: version
        type: string
    propertyOrder:
      - $this
      - $Extensible

  - name: Contact
    traits:
      - Extensible
    properties:
      - name: name
        type: string
      - name: url
        type: string
      - name: email
        type: string
    propertyOrder:
      - $this
      - $Extensible

  - name: License
    traits:
      - Extensible
    properties:
      - name: name
        type: string
      - name: url
        type: string
    propertyOrder:
      - $this
      - $Extensible

  - name: Server
    traits:
      - Extensible
    properties:
      - name: name
        type: string
      - name: url
        type: string
      - name: summary
        type: string
      - name: description
        type: string
      - name: variables
        type: '{ServerVariable}'
    propertyOrder:
      - $this
      - $Extensible

  - name: ServerVariable
    traits:
      - Extensible
    properties:
      - name: default
        type: string
      - name: description
        type: string
      - name: enum
        type: '[string]'
    propertyOrder:
      - $this
      - $Extensible

  - name: Method
    traits:
      - Extensible
      - Referenceable
      - ServersParent
    properties:
      - name: name
        type: string
      - name: tags
        type: '[Tag]'
      - name: summary
        type: string
      - name: description
        type: string
      - name: externalDocs
        type: ExternalDocumentation
      - name: params
        type: '[ContentDescriptor]'
      - name: result
        type: ContentDescriptor
      - name: deprecated
        type: boolean
      - name: servers
        type: '[Server]'
      - name: errors
        type: '[Error]'
      - name: links
        type: '[Link]'
      - name: paramStructure
        type: string
      - name: examples
        type: '[ExamplePairing]'
    propertyOrder:
      - $Referenceable
      - $this
      - $Extensible

  - name: ContentDescriptor
    traits:
      - Extensible
      - Referenceable
    properties:
      - name: name
        type: string
      - name: summary
        type: string
      - name: description
        type: string
      - name: required
        type: boolean
      - name: deprecated
        type: boolean
      - name: schema
        type: Schema
    propertyOrder:
      - $Referenceable
      - $this
      - $Extensible

  - name: Schema
    traits:
      - Extensible
      - Referenceable
    properties:
      - name: title
        type: string
      - name: type
        type: string
      - name: required
        type: '[string]'
      - name: multipleOf
        type: number
      - name: maximum
        type: number
      - name: exclusiveMaximum
        type: number
      - name: minimum
        type: number
      - name: exclusiveMinimum
        type: number
      - name: maxLength
        type: integer
      - name: minLength
        type: integer
      - name: pattern
        type: string
      - name: maxItems
        type: integer
      - name: minItems
        type: integer
      - name: uniqueItems
        type: boolean
      - name: maxProperties
        type: integer
      - name: minProperties
        type: integer
      - name: enum
        type: '[any]'
      - name: const
        type: any
      - name: examples
        type: '[any]'
      - name: if
        type: Schema
      - name: then
        type: Schema
      - name: else
        type: Schema
      - name: readOnly
        type: boolean
      - name: writeOnly
        type: boolean
      - name: properties
        type: '{Schema}'
      - name: patternProperties
        type: '{string}'
      - name: additionalProperties
        type: 'boolean|Schema'
      - name: additionalItems
        type: Schema
      - name: items
        type: 'Schema|[Schema]'
      - name: propertyNames
        type: Schema
      - name: contains
        type: Schema
      - name: allOf
        type: '[Schema]'
      - name: oneOf
        type: '[Schema]'
      - name: anyOf
        type: '[Schema]'
      - name: not
        type: Schema
      - name: description
        type: string
      - name: format
        type: string
      - name: default
        type: any
      - name: deprecated
        type: boolean
    propertyOrder:
      - $Referenceable
      - $this
      - $Extensible

  - name: ExamplePairing
    traits:
      - Extensible
      - Referenceable
    properties:
      - name: name
        type: string
      - name: description
        type: string
      - name: summary
        type: string
      - name: params
        type: '[Example]'
      - name: result
        type: Example
    propertyOrder:
      - $Referenceable
      - $this
      - $Extensible

  - name: Example
    traits:
      - Extensible
      - Referenceable
    properties:
      - name: name
        type: string
      - name: summary
        type: string
      - name: description
        type: string
      - name: value
        type: any
      - name: externalValue
        type: string
    propertyOrder:
      - $Referenceable
      - $this
      - $Extensible

  - name: Link
    traits:
      - Extensible
      - Referenceable
    properties:
      - name: name
        type: string
      - name: summary
        type: string
      - name: description
        type: string
      - name: method
        type: string
      - name: params
        type: any
      - name: server
        type: Server
    propertyOrder:
      - $Referenceable
      - $this
      - $Extensible

  - name: Error
    traits:
      - Referenceable
    properties:
      - name: code
        type: integer
      - name: message
        type: string
      - name: data
        type: any
    propertyOrder:
      - $Referenceable
      - $this

  - name: Components
    traits:
      - Extensible
    properties:
      - name: contentDescriptors
        type: '{ContentDescriptor}'
      - name: schemas
        type: '{Schema}'
      - name: examples
        type: '{Example}'
      - name: links
        type: '{Link}'
      - name: errors
        type: '{Error}'
      - name: examplePairings
        type: '{ExamplePairing}'
      - name: tags
        type: '{Tag}'
    propertyOrder:
      - $this
      - $Extensible

  - name: Tag
    traits:
      - Extensible
      - Referenceable
    properties:
      - name: name
        type: string
      - name: summary
        type: string
      - name: description
        type: string
      - name: externalDocs
        type: ExternalDocumentation
    propertyOrder:
      - $Referenceable
      - $this
      - $Extensible

  - name: ExternalDocumentation
    traits:
      - Extensible
    properties:
      - name: description
        type: string
      - name: url
        type: string
    propertyOrder:
      - $this
      - $Extensible
